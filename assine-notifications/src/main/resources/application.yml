spring:
  application:
    name: assine-notifications
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

server:
  port: ${SERVER_PORT:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

assine:
  sendgrid:
    api-key: ${SENDGRID_API_KEY:SG.dummy}
    from-email: ${SENDGRID_FROM_EMAIL:no-reply@assine.com.br}
    from-name: ${SENDGRID_FROM_NAME:Assine}
