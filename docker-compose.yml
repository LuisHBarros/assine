name: assine

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-assine}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-assine}
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  postgres-auth:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-auth}
      POSTGRES_USER: ${AUTH_DB_USER:-assine}
      POSTGRES_PASSWORD: ${AUTH_DB_PASS:-assine}
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-assine} -d ${AUTH_DB_NAME:-auth}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  postgres-billing:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${BILLING_DB_NAME:-billing}
      POSTGRES_USER: ${BILLING_DB_USER:-assine}
      POSTGRES_PASSWORD: ${BILLING_DB_PASS:-assine}
    volumes:
      - postgres_billing_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BILLING_DB_USER:-assine} -d ${BILLING_DB_NAME:-billing}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  postgres-subscriptions:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SUBSCRIPTIONS_DB_NAME:-subscriptions}
      POSTGRES_USER: ${SUBSCRIPTIONS_DB_USER:-assine}
      POSTGRES_PASSWORD: ${SUBSCRIPTIONS_DB_PASS:-assine}
    volumes:
      - postgres_subscriptions_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SUBSCRIPTIONS_DB_USER:-assine} -d ${SUBSCRIPTIONS_DB_NAME:-subscriptions}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  postgres-access:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ACCESS_DB_NAME:-access}
      POSTGRES_USER: ${ACCESS_DB_USER:-assine}
      POSTGRES_PASSWORD: ${ACCESS_DB_PASS:-assine}
    volumes:
      - postgres_access_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ACCESS_DB_USER:-assine} -d ${ACCESS_DB_NAME:-access}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  postgres-fiscal:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${FISCAL_DB_NAME:-fiscal}
      POSTGRES_USER: ${FISCAL_DB_USER:-assine}
      POSTGRES_PASSWORD: ${FISCAL_DB_PASS:-assine}
    volumes:
      - postgres_fiscal_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FISCAL_DB_USER:-assine} -d ${FISCAL_DB_NAME:-fiscal}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  minio:
    image: minio/minio:RELEASE.2024-08-29T01-43-32Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-assine}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-assine-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth:
    build:
      context: ./assine-auth
    restart: unless-stopped
    environment:
      SERVER_PORT: 8086
      DB_HOST: postgres-auth
      DB_PORT: 5432
      DB_NAME: ${AUTH_DB_NAME:-auth}
      DB_USER: ${AUTH_DB_USER:-assine}
      DB_PASS: ${AUTH_DB_PASS:-assine}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-assine}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-assine}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-change-me}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-change-me}
      MAGIC_LINK_BASE_URL: ${MAGIC_LINK_BASE_URL:-http://localhost:8086/auth/magic-link/validate}
    expose:
      - "8086"
    depends_on:
      postgres-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8086/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  billing:
    build:
      context: ./assine-billing
    restart: unless-stopped
    environment:
      SERVER_PORT: 8082
      DB_HOST: postgres-billing
      DB_PORT: 5432
      DB_NAME: ${BILLING_DB_NAME:-billing}
      DB_USER: ${BILLING_DB_USER:-assine}
      DB_PASS: ${BILLING_DB_PASS:-assine}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-assine}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-assine}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SUBSCRIPTIONS_SERVICE_URL: ${SUBSCRIPTIONS_SERVICE_URL:-http://subscriptions:8081}
    expose:
      - "8082"
    depends_on:
      postgres-billing:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  subscriptions:
    build:
      context: ./assine-subscriptions
    restart: unless-stopped
    environment:
      SERVER_PORT: 8081
      DB_HOST: postgres-subscriptions
      DB_PORT: 5432
      DB_NAME: ${SUBSCRIPTIONS_DB_NAME:-subscriptions}
      DB_USER: ${SUBSCRIPTIONS_DB_USER:-assine}
      DB_PASS: ${SUBSCRIPTIONS_DB_PASS:-assine}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-assine}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-assine}
    expose:
      - "8081"
    depends_on:
      postgres-subscriptions:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  access:
    build:
      context: ./assine-access
    restart: unless-stopped
    environment:
      SERVER_PORT: 8083
      DB_HOST: postgres-access
      DB_PORT: 5432
      DB_NAME: ${ACCESS_DB_NAME:-access}
      DB_USER: ${ACCESS_DB_USER:-assine}
      DB_PASS: ${ACCESS_DB_PASS:-assine}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-assine}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-assine}
    expose:
      - "8083"
    depends_on:
      postgres-access:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8083/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  fiscal:
    build:
      context: ./assine-fiscal
    restart: unless-stopped
    environment:
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-fiscal:5432/${FISCAL_DB_NAME:-fiscal}
      SPRING_DATASOURCE_USERNAME: ${FISCAL_DB_USER:-assine}
      SPRING_DATASOURCE_PASSWORD: ${FISCAL_DB_PASS:-assine}
      SPRING_RABBITMQ_HOST: rabbitmq
      AWS_S3_ENDPOINT: http://minio:9000
      AWS_S3_ACCESS_KEY: ${MINIO_ACCESS_KEY:-assine}
      AWS_S3_SECRET_KEY: ${MINIO_SECRET_KEY:-assine-secret}
      AWS_S3_BUCKET_NAME: invoices
      NUVEM_FISCAL_CLIENT_ID: ${NUVEM_FISCAL_CLIENT_ID:-}
      NUVEM_FISCAL_CLIENT_SECRET: ${NUVEM_FISCAL_CLIENT_SECRET:-}
      NUVEM_FISCAL_ENVIRONMENT: sandbox
      SUBSCRIPTION_SERVICE_URL: http://subscriptions:8081
    expose:
      - "8085"
    depends_on:
      postgres-fiscal:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8085/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  notifications:
    build:
      context: ./assine-notifications
    restart: unless-stopped
    environment:
      SERVER_PORT: 8084
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-assine}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-assine}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-no-reply@assine.com.br}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME:-Assine}
    expose:
      - "8084"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8084/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  content:
    build:
      context: ./assine-content
    restart: unless-stopped
    environment:
      SERVER_PORT: 8087
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-assine}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-assine}
      NOTION_API_KEY: ${NOTION_API_KEY:-}
      NOTION_DATABASE_ID: ${NOTION_DATABASE_ID:-}
    expose:
      - "8087"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8087/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      auth:
        condition: service_started
      billing:
        condition: service_started
      subscriptions:
        condition: service_started
      access:
        condition: service_started
      notifications:
        condition: service_started
      fiscal:
        condition: service_started

  grafana:
    image: grafana/grafana:11.2.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started

  zipkin:
    image: openzipkin/zipkin:3.4.2
    restart: unless-stopped
    ports:
      - "9411:9411"

  frontend:
    profiles:
      - frontend
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-placeholder.apps.googleusercontent.com}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"

volumes:
  rabbitmq_data:
  postgres_auth_data:
  postgres_billing_data:
  postgres_subscriptions_data:
  postgres_access_data:
  postgres_fiscal_data:
  minio_data:
  prometheus_data:
  grafana_data:
