spring:
  application:
    name: assine-auth
  datasource:
    url: jdbc:postgresql://postgres-auth:5432/auth
    username: assine
    password: assine
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: assine
    password: assine

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

google:
  oauth2:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    scopes: openid,email,profile
    authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo

jwt:
  private-key: ${JWT_PRIVATE_KEY}
  public-key: ${JWT_PUBLIC_KEY}
  access-token-expiration: 3600000      # 1 hora em ms
  refresh-token-expiration: 604800000   # 7 dias em ms

magic:
  link:
    expiration-minutes: 15
    base-url: https://assine.com/auth/magic-link/validate

scheduler:
  cleanup:
    cron: "0 0 3 * * *"  # 3h da manhã todos os dias
