spring:
  datasource:
    url: jdbc:h2:mem:auth;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  sql:
    init:
      mode: never

google:
  oauth2:
    client-id: test-client
    client-secret: test-secret

jwt:
  private-key: test-private-key
  public-key: test-public-key
