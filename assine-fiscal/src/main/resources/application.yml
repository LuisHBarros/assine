server:
  port: 8085

spring:
  application:
    name: assine-fiscal
  datasource:
    url: jdbc:postgresql://postgres-fiscal:5432/fiscal
    username: assine
    password: assine
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: assine
    password: assine

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

aws:
  s3:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
    access-key: ${MINIO_ACCESS_KEY:assine}
    secret-key: ${MINIO_SECRET_KEY:assine-secret}
    bucket-name: invoices
    region: us-east-1

nuvem:
  fiscal:
    client-id: ${NUVEM_FISCAL_CLIENT_ID}
    client-secret: ${NUVEM_FISCAL_CLIENT_SECRET}
    environment: ${NUVEM_FISCAL_ENVIRONMENT:sandbox}
    base-url: https://api.nuvemfiscal.com.br

invoice:
  retry:
    max-attempts: 5
    backoff-initial: 1000  # 1 segundo
    backoff-multiplier: 2
